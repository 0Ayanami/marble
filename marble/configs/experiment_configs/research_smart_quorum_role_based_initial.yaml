experiment:
  name: research_smart_quorum_role_based_initial
  output_root: experiments/research_smart_quorum_role_based_initial
  run_id: role_based_5_agents_1_byzantine_llm
  seed: null

agents:
  total: 5
  honest: 4
  byzantine: 1
  honest_model: qwen3.7-max-preview
  byzantine_model: qwen3-max-preview
  model_capability_coefficients:
    qwen3.7-max-preview: 1.0
    qwen3-max-preview: 0.7
  byzantine_strategy: disabled
  honest_ids: []
  byzantine_ids: []
  profiles: []
  agent_overrides: {}

collaboration:
  mode: role_based
  rounds: 1
  max_tokens: 192
  temperature: 0.0
  disable_environment_actions: true
  options:
    use_agent_act: false

proposal:
  enabled: true
  builder_enabled: true
  verification_enabled: true
  weight_manager_enabled: true
  max_rounds: 1
  include_proposer_as_verifier: false
  verification:
    type: llm
    fallback_to_heuristic: true
  consensus:
    strategy: smart_quorum
    confidence_threshold: 0.6
    majority_threshold: 0.5
    strict_majority: true
    minimum_votes: 1
    hard_fail_dimensions:
      - security
    epsilon_ratio: 0.1
    epsilon: null
    use_dynamic_estimate: false
    scheduler:
      min_verifiers: null
      max_verifiers: null
  fisher_ida:
    enabled: false
    alpha_initial: 0.6
    beta_initial: 0.4
    M: 1
    parameters: {}
  weight_manager:
    alpha: 0.6
    beta: 0.4
    theta: 0.5
    gamma: 5.0

benchmark:
  type: multiagentbench
  dataset: multiagentbench/research/research_main.jsonl
  task_id: 1-10
  output_dir: experiments/research_smart_quorum_role_based_initial
  attack_dataset: null
  defaults:
    coordinate_mode: graph
  options:
    evaluate_kpi: true

attack_dataset:
  enabled: false
  type: none
  dataset: null
  split: null
  distribution: round_robin
  options: {}
